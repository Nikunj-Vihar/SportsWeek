name = "sportsweek-proxy"
main = "worker/index.js"
compatibility_date = "2026-07-01"

# CORS: restricted to the deployed GitHub Pages origin.
[vars]
ALLOWED_ORIGIN = "https://nikunj-vihar.github.io"

# Persistent cache so stale-serving works across isolates.
[[kv_namespaces]]
binding = "SPORTSWEEK_KV"
id = "55d7be11d3204c459db2027726b00322"

# Secrets (never in this file, never in git):
#   wrangler secret put THESPORTSDB_KEY
# Without it the Worker falls back to TheSportsDB's public demo key "3"
# (rate-limited, results capped at ~3 events per sport per day).
